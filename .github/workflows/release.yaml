name: release
run-name: Run GoReleaser
on:
  push:
    tags:
      - '*'
permissions:
  contents: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      -
        name: Set up Go
        uses: actions/setup-go@v5
      -
        name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Create versioned Brew formula
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          MINOR="${VERSION%.*}"
          CLASS_SUFFIX=$(echo "${MINOR}" | tr -d '.')
          FORMULA="Formula/dhcli@${MINOR}.rb"

          sha_for() { grep " $1\$" dist/checksums.txt | awk '{print $1}'; }

          SHA_DARWIN_AMD64=$(sha_for dhcli-darwin-amd64.tar.gz)
          SHA_DARWIN_ARM64=$(sha_for dhcli-darwin-arm64.tar.gz)
          SHA_LINUX_AMD64=$(sha_for dhcli-linux-amd64.tar.gz)
          SHA_LINUX_ARM64=$(sha_for dhcli-linux-arm64.tar.gz)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull origin main

          cat > "$FORMULA" <<EOF
          # typed: false
          # frozen_string_literal: true

          # Generated by .github/workflows/release.yaml. DO NOT EDIT.
          class DhcliAT${CLASS_SUFFIX} < Formula
            desc "A command-line tool for DigitalHub platform."
            homepage "https://scc-digitalhub.github.io/"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/scc-digitalhub/digitalhub-cli/releases/download/${VERSION}/dhcli-darwin-amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"

                define_method(:install) do
                  bin.install "dhcli"
                end
              end
              if Hardware::CPU.arm?
                url "https://github.com/scc-digitalhub/digitalhub-cli/releases/download/${VERSION}/dhcli-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"

                define_method(:install) do
                  bin.install "dhcli"
                end
              end
            end

            on_linux do
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "https://github.com/scc-digitalhub/digitalhub-cli/releases/download/${VERSION}/dhcli-linux-amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
                define_method(:install) do
                  bin.install "dhcli"
                end
              end
              if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "https://github.com/scc-digitalhub/digitalhub-cli/releases/download/${VERSION}/dhcli-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
                define_method(:install) do
                  bin.install "dhcli"
                end
              end
            end
          end
          EOF

          git add "$FORMULA"
          git commit -m "Brew formula for dhcli@${MINOR} (${VERSION})" || true
          git push origin main

  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'true'
      - name: Log in to the Container registry
        uses: docker/login-action@v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5.5.1
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5.1.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            "VER=${{ github.event.release.name }}"          
